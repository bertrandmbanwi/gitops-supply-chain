apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: baseline-hardening
spec:
  rules:
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              namespaces: ["kube-system", "kube-public", "kube-node-lease", "argocd", "kyverno"]
      validate:
        failureAction: Enforce
        message: "Mutable ':latest' image tags are not allowed; pin an explicit tag."
        pattern:
          spec:
            containers:
              - image: "!*:latest"
    - name: require-resources
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              namespaces: ["kube-system", "kube-public", "kube-node-lease", "argocd", "kyverno"]
      validate:
        failureAction: Enforce
        message: "CPU and memory requests and limits are required on every container."
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
    - name: require-run-as-nonroot
      match:
        any:
          - resources:
              kinds: ["Pod"]
      exclude:
        any:
          - resources:
              namespaces: ["kube-system", "kube-public", "kube-node-lease", "argocd", "kyverno"]
      validate:
        failureAction: Enforce
        message: "Containers must run as non-root (set securityContext.runAsNonRoot: true)."
        anyPattern:
          - spec:
              securityContext:
                runAsNonRoot: true
          - spec:
              containers:
                - securityContext:
                    runAsNonRoot: true
